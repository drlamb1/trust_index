# =============================================================================
# EdgeFinder — Ticker Universe Configuration
# =============================================================================
#
# The system manages three categories of tickers:
#
#   universe.sp500: true       → Auto-fetches current S&P 500 constituents weekly
#                                from Wikipedia. Additions/removals are tracked.
#
#   universe.sp500_additions   → Recently added to S&P 500 (momentum signal)
#
#   universe.custom            → Individual tickers to track regardless of index
#
#   watchlist                  → Tickers with associated theses, notes, and
#                                priority for the daily briefing
#
# CLI: edgefinder ticker add PLTR --thesis ai_defense --notes "Gov AI contracts"
# =============================================================================

universe:
  # Auto-fetches and maintains S&P 500 constituent list
  # Source: Wikipedia (updated weekly by Celery Beat job)
  sp500: true

  # Additional indexes to track (future)
  # russell_1000: false
  # nasdaq_100: false

  # Custom tickers beyond the index
  custom:
    - PLTR   # Palantir — AI/defense analytics
    - RKLB   # Rocket Lab — space launch
    - SMR    # NuScale Power — small modular reactors
    - OKLO   # Oklo — advanced fission
    - JOBY   # Joby Aviation — eVTOL
    - LUNR   # Intuitive Machines — lunar logistics
    - RR     # Rolls-Royce — nuclear + aero engines

