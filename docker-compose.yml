# =============================================================================
# EdgeFinder — Docker Compose
# Full local stack: web + worker + Redis.
# Neon PostgreSQL is cloud-managed (see .env DATABASE_URL).
# =============================================================================

services:
  web:
    build: .
    container_name: edgefinder-web
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"
    env_file: .env
    environment:
      - PROCESS_TYPE=web
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: edgefinder-worker
    env_file: .env
    environment:
      - PROCESS_TYPE=worker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  simulation-worker:
    build: .
    container_name: edgefinder-simulation
    env_file: .env
    environment:
      - PROCESS_TYPE=simulation-worker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: edgefinder-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
