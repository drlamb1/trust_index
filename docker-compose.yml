version: "3.9"

# =============================================================================
# EdgeFinder — Docker Compose
# Neon PostgreSQL is cloud-managed; this only runs local Redis for development.
# In production, replace Redis with Upstash (see .env.example).
# =============================================================================

services:
  redis:
    image: redis:7.4-alpine
    container_name: edgefinder-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
